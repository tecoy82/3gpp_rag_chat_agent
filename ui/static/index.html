<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3GPP RAG Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 1rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155; }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #94a3b8; letter-spacing: .05em; }
    header span { color: #38bdf8; }
    #chat-window { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .message { max-width: 75%; padding: .75rem 1rem; border-radius: .75rem; line-height: 1.6; font-size: .92rem; }
    .user { align-self: flex-end; background: #1d4ed8; color: #fff; }
    .agent { align-self: flex-start; background: #1e293b; color: #cbd5e1; border: 1px solid #334155; }
    .agent h2, .agent h3 { color: #e2e8f0; margin: .75rem 0 .25rem; }
    .agent h2 { font-size: 1rem; }
    .agent h3 { font-size: .92rem; }
    .agent ul, .agent ol { padding-left: 1.25rem; margin: .25rem 0; }
    .agent li { margin: .15rem 0; }
    .agent hr { border: none; border-top: 1px solid #334155; margin: .75rem 0; }
    .agent strong { color: #e2e8f0; }
    .agent p { margin: .4rem 0; }
    .agent.cached::before { content: "⚡ cached · "; color: #38bdf8; font-size: .78rem; }
    .thinking { color: #64748b; font-style: italic; }
    .duration { font-size: .75rem; color: #475569; margin-top: .35rem; }
    #input-row { display: flex; gap: .75rem; padding: 1rem 1.5rem; background: #1e293b; border-top: 1px solid #334155; }
    #question { flex: 1; padding: .65rem 1rem; border-radius: .5rem; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: .92rem; outline: none; }
    #question:focus { border-color: #38bdf8; }
    #send-btn { padding: .65rem 1.25rem; border-radius: .5rem; background: #1d4ed8; color: #fff; border: none; cursor: pointer; font-weight: 600; }
    #send-btn:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>3GPP RAG Assistant &mdash; <span>LTE &amp; 5G Standards Q&amp;A</span></h1>
  </header>

  <div id="chat-window">
    <div class="message agent">
      Hello! I can answer questions about LTE (4G) and 5G NR based on 3GPP specifications.
      Try asking about network architecture, interfaces, or protocols.
    </div>
  </div>

  <div id="input-row">
    <input id="question" type="text" placeholder="Ask about LTE or 5G..." autofocus />
    <button id="send-btn">Send</button>
  </div>

  <script>
    const chatWindow = document.getElementById("chat-window");
    const questionInput = document.getElementById("question");
    const sendBtn = document.getElementById("send-btn");
    let sessionId = null;

    function addMessage(text, role, cached = false, duration = null) {
      const div = document.createElement("div");
      div.className = "message " + role + (cached ? " cached" : "");
      if (role === "agent") {
        div.innerHTML = marked.parse(text);
      } else {
        div.textContent = text;
      }
      if (duration !== null) {
        const meta = document.createElement("div");
        meta.className = "duration";
        meta.textContent = cached
          ? `⚡ cache hit · ${duration}s`
          : `⏱ ${duration}s`;
        div.appendChild(meta);
      }
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
      return div;
    }

    async function sendQuestion() {
      const question = questionInput.value.trim();
      if (!question) return;

      questionInput.value = "";
      sendBtn.disabled = true;
      addMessage(question, "user");

      const thinkingEl = addMessage("Thinking...", "agent thinking");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question, session_id: sessionId }),
        });
        const data = await res.json();
        sessionId = data.session_id;
        thinkingEl.remove();
        addMessage(data.answer, "agent", data.cached, data.duration_s);
      } catch (err) {
        thinkingEl.textContent = "Error: could not reach the server.";
        thinkingEl.classList.remove("thinking");
      }

      sendBtn.disabled = false;
      questionInput.focus();
    }

    sendBtn.addEventListener("click", sendQuestion);
    questionInput.addEventListener("keydown", e => { if (e.key === "Enter") sendQuestion(); });
  </script>
</body>
</html>
